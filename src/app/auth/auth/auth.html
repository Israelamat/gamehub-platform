<div class="auth-container">
  <div class="auth-card" reveal anim="fade-up">

    <h1 class="auth-title">Welcome</h1>
    <p class="auth-subtitle">Access your account or create a new one</p>

    <div class="auth-tabs">
      <button [class.active]="mode === 'login'" (click)="mode = 'login'">
        Login
      </button>
      <button [class.active]="mode === 'register'" (click)="mode = 'register'">
        Sign Up
      </button>
    </div>

    <div class="form-wrapper">

      <form class="auth-form" [class.active]="mode === 'login'" (ngSubmit)="login()">

        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="loginForm.email" name="loginEmail" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="loginForm.password" name="loginPassword" required>
        </div>

        <button class="btn-submit" type="submit">
          <i class="bi bi-box-arrow-in-right"></i>
          LOGIN
        </button>

      </form>

      <form class="auth-form" [class.active]="mode === 'register'" (ngSubmit)="register()">

        <div class="form-group">
          <label>Name</label>
          <input type="text" [(ngModel)]="registerForm.name" name="name" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="registerForm.email" name="email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="registerForm.password" name="password" required>
        </div>

        <div class="form-group">
          <label>Repeat Password</label>
          <input type="password" [(ngModel)]="registerForm.repeatPassword" name="repeatPassword" required>
        </div>

        <button class="btn-submit" type="submit">
          <i class="bi bi-person-plus"></i>
          CREATE ACCOUNT
        </button>

      </form>

    </div>

  </div>
</div>
