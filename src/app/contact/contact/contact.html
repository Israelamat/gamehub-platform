<div class="contact-container">
  <div class="contact-card" reveal anim="fade-up">

    <h1 class="contact-title">Contact Us</h1>
    <p class="contact-subtitle">
      Got questions, feedback or issues? Send us a message
    </p>

    <form class="contact-form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Name</label>
        <input type="text" [(ngModel)]="form.name" name="name" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="form.email" name="email" required />
      </div>

      <div class="form-group">
        <label>Subject</label>
        <input type="text" [(ngModel)]="form.subject" name="subject" required />
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea rows="5" [(ngModel)]="form.message" name="message" required></textarea>
      </div>

      <button class="btn-submit" type="submit">
        <i class="bi bi-send"></i>
        SEND MESSAGE
      </button>

    </form>
  </div>
</div>
