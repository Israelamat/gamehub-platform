<section id="portfolio" class="portfolio">
  <div class="container">

    <div class="section-title mt-5 mb-4" reveal anim="fade-up">
      <h3>Games Powered By GameHub</h3>
      <p class="fst-italic">Discover the world of game development with GameHub.</p>
    </div>

    <div class="row">
      <div class="col-lg-12 d-flex justify-content-center" reveal anim="fade-up" [delay]="200">
        <ul id="portfolio-flters">
          <li (click)="setFilter('*')" [class.filter-active]="selectedFilter === '*'">All</li>
          <li (click)="setFilter('filter-simulator')" [class.filter-active]="selectedFilter === 'filter-simulator'">
            Simulator</li>
          <li (click)="setFilter('filter-2D')" [class.filter-active]="selectedFilter === 'filter-2D'">2D</li>
          <li (click)="setFilter('filter-3D')" [class.filter-active]="selectedFilter === 'filter-3D'">3D</li>
        </ul>
      </div>
    </div>

    <div class="row portfolio-container">
      @for (game of games; track game.title) {
      <div class="col-lg-4 col-md-6 portfolio-item" [hidden]="!isVisible(game.category)" reveal anim="zoom-in"
        [delay]="$index * 150">

        <div class="portfolio-wrap">
          <div class="image-container">
            <img [src]="game.image" class="img-fluid" [alt]="game.title">
          </div>
          <div class="portfolio-info">
            <h4>{{ game.title }}</h4>
            <p>{{ game.description }}</p>
          </div>
        </div>
      </div>
      }
    </div>

  </div>
</section>
