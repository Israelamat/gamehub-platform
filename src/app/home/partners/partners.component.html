<section id="clients" class="clients">
  <div class="container">
    <div class="row align-items-center">

      <div class="col-lg-2 col-md-4 col-6 px-4 px-lg-5">
        <img src="img/clients/client-1.png" class="img-fluid" reveal anim="zoom-in">
      </div>

      <div class="col-lg-2 col-md-4 col-6 px-4 px-lg-5">
        <img src="img/clients/client-2.png" class="img-fluid" reveal anim="zoom-in" [delay]="100">
      </div>

      <div class="col-lg-2 col-md-4 col-6 px-4 px-lg-5">
        <img src="img/clients/client-3.png" class="img-fluid" reveal anim="zoom-in" [delay]="200">
      </div>

      <div class="col-lg-2 col-md-4 col-6 px-4 px-lg-5">
        <img src="img/clients/client-4.png" class="img-fluid" reveal anim="zoom-in" [delay]="300">
      </div>

      <div class="col-lg-2 col-md-4 col-6 px-4 px-lg-5">
        <img src="img/clients/client-5.png" class="img-fluid" reveal anim="zoom-in" [delay]="400">
      </div>

      <div class="col-lg-2 col-md-4 col-6 px-4 px-lg-5">
        <img src="img/clients/client-6.png" class="img-fluid" reveal anim="zoom-in" [delay]="500">
      </div>

    </div>
  </div>
</section>
